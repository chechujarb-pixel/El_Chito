<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#f0f0f0;font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,200,80,0.06) 0%,transparent 60%);pointer-events:none}
.container{max-width:480px;margin:0 auto;padding:48px 20px 60px}
.header{text-align:center;margin-bottom:48px}
.header-label{font-size:11px;letter-spacing:5px;color:#888;margin-bottom:10px}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:3px;line-height:1;color:#fff}
.header h1 span{color:#e8a020}
.header-sub{margin-top:10px;font-size:13px;color:#555;letter-spacing:2px;font-weight:300}
.cards{display:flex;flex-direction:column;gap:20px}
.card{position:relative;border-radius:14px;overflow:hidden;cursor:pointer;text-decoration:none;display:block;transition:transform 0.2s,box-shadow 0.2s}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.card img{width:100%;display:block;aspect-ratio:1;object-fit:cover}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.1) 50%,transparent 100%)}
.card-body{position:absolute;bottom:0;left:0;right:0;padding:20px}
.card-num{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;margin-bottom:4px;opacity:0.7}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1.1}
.card-meta{font-size:12px;color:rgba(255,255,255,0.5);margin-top:4px;font-weight:300;letter-spacing:1px}
.card-arrow{position:absolute;top:50%;right:20px;transform:translateY(-50%);width:40px;height:40px;background:rgba(255,255,255,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.c1 .card-num{color:#e8a020} .c1 .card-title{color:#fff}
.c2 .card-num{color:#c8852a} .c2 .card-title{color:#ffe8c0}
.c3 .card-num{color:#9d6ff0} .c3 .card-title{color:#e8e0f8}
</style>
</head>
