<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Despertar de la Carretera</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0a07;--surface:#1a1208;--accent:#e8a020;--accent2:#c45c10;--text:#f0e8d8;--muted:#7a6a52;--bar-h:4px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}

.back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;letter-spacing:1px;padding:12px 0 0 24px;transition:color 0.2s}
.back-btn:hover{color:var(--text)}

.container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 100px}
.header{padding:16px 24px 24px;border-bottom:1px solid rgba(232,160,32,0.15)}
.cover-wrap{width:100%;aspect-ratio:1;overflow:hidden;border-radius:10px;margin-bottom:20px;position:relative}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.header-label{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:var(--accent);margin-bottom:8px}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,9vw,48px);line-height:1;letter-spacing:2px;color:var(--text)}
.header h1 span{color:var(--accent)}
.header-meta{margin-top:8px;font-size:13px;color:var(--muted);font-weight:300;letter-spacing:1px}
.now-playing{margin:20px 16px;background:linear-gradient(135deg,#1e1508 0%,#2a1c0a 100%);border:1px solid rgba(232,160,32,0.2);border-radius:12px;padding:20px;position:relative;overflow:hidden}
.now-playing::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(232,160,32,0.15) 0%,transparent 70%);border-radius:50%}
.np-label{font-size:10px;letter-spacing:3px;color:var(--accent);font-family:'Bebas Neue',sans-serif;margin-bottom:6px}
.np-title{font-size:20px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-index{font-size:12px;color:var(--muted);margin-top:4px}
.progress-wrap{margin-top:16px;cursor:pointer}
.progress-bg{width:100%;height:var(--bar-h);background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0%;border-radius:2px;transition:width 0.3s linear}
.time-row{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.controls{display:flex;align-items:center;justify-content:center;gap:24px;margin-top:20px}
.btn{background:none;border:none;color:var(--muted);cursor:pointer;transition:color 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center}
.btn:hover{color:var(--text);transform:scale(1.1)}
.btn-play{width:52px;height:52px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:50%;color:#000;box-shadow:0 4px 20px rgba(232,160,32,0.35)}
.btn-play:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(232,160,32,0.5);color:#000}
.volume-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.volume-row svg{color:var(--muted);flex-shrink:0}
input[type=range]{flex:1;-webkit-appearance:none;height:var(--bar-h);background:rgba(255,255,255,0.1);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer}
.tracklist{margin:8px 16px 0}
.track{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:8px;cursor:pointer;transition:background 0.18s;border-bottom:1px solid rgba(255,255,255,0.04)}
.track:hover{background:rgba(232,160,32,0.07)}
.track.active{background:rgba(232,160,32,0.12);border-color:transparent}
.track-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);width:22px;text-align:center;flex-shrink:0}
.track.active .track-num{color:var(--accent)}
.track-info{flex:1;min-width:0}
.track-name{font-size:15px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track.active .track-name{color:var(--accent)}
.track-dur{font-size:12px;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums}
.eq{display:none;gap:2px;align-items:flex-end;height:14px}
.track.active.playing .eq{display:flex}
.track.active.playing .track-num{display:none}
.eq span{width:3px;background:var(--accent);border-radius:1px;animation:eq 0.8s ease-in-out infinite alternate}
.eq span:nth-child(2){animation-delay:0.2s}.eq span:nth-child(3){animation-delay:0.4s}
@keyframes eq{0%{height:3px}100%{height:14px}}
.loading{display:none;width:18px;height:18px;border:2px solid rgba(232,160,32,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
.track.active.buffering .loading{display:block}
.track.active.buffering .track-num,.track.active.buffering .eq{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
audio{display:none}
</style>
</head>

function fmt(s){if(isNaN(s)||s===undefined)return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec.toString().padStart(2,'0')}`}
function renderList(){document.getElementById('tracklist').innerHTML=tracks.map((t,i)=>`<div class="track" id="track${i}" onclick="loadTrack(${i})"><div class="eq"><span></span><span></span><span></span></div><div class="loading"></div><div class="track-num">${i+1}</div><div class="track-info"><div class="track-name">${t.title}</div></div><div class="track-dur" id="dur${i}">0:00</div></div>`).join('')}
function setActive(i){document.querySelectorAll('.track').forEach(el=>el.classList.remove('active','playing','buffering'));if(i>=0){document.getElementById(`track${i}`).classList.add('active');document.getElementById(`track${i}`).scrollIntoView({behavior:'smooth',block:'nearest'})}document.getElementById('npTitle').textContent=i>=0?tracks[i].title:'—';document.getElementById('npIndex').textContent=i>=0?`${i+1} de ${tracks.length}`:'—'}
function loadTrack(i){current=i;setActive(i);document.getElementById(`track${i}`).classList.add('buffering');audio.src=tracks[i].url;audio.volume=document.getElementById('volume').value;audio.load();audio.play().catch(()=>{})}
function togglePlay(){if(current<0){loadTrack(0);return}if(audio.paused)audio.play();else audio.pause()}
function prev(){if(current>0)loadTrack(current-1)}
function next(){if(current<tracks.length-1)loadTrack(current+1)}
function setVolume(v){audio.volume=v}
audio.addEventListener('playing',()=>{document.getElementById('iconPlay').style.display='none';document.getElementById('iconPause').style.display='';const el=document.getElementById(`track${current}`);if(el){el.classList.remove('buffering');el.classList.add('playing')}});
audio.addEventListener('pause',()=>{document.getElementById('iconPlay').style.display='';document.getElementById('iconPause').style.display='none';const el=document.getElementById(`track${current}`);if(el)el.classList.remove('playing')});
audio.addEventListener('timeupdate',()=>{const pct=audio.duration?(audio.currentTime/audio.duration)*100:0;document.getElementById('progressFill').style.width=pct+'%';document.getElementById('timeCurrent').textContent=fmt(audio.currentTime);document.getElementById('timeTotal').textContent=fmt(audio.duration)});
audio.addEventListener('loadedmetadata',()=>{document.getElementById(`dur${current}`).textContent=fmt(audio.duration);document.getElementById('timeTotal').textContent=fmt(audio.duration)});
audio.addEventListener('ended',()=>{if(current<tracks.length-1)loadTrack(current+1);else{document.getElementById('iconPlay').style.display='';document.getElementById('iconPause').style.display='none'}});
audio.addEventListener('waiting',()=>{const el=document.getElementById(`track${current}`);if(el){el.classList.remove('playing');el.classList.add('buffering')}});
document.getElementById('progressWrap').addEventListener('click',(e)=>{if(!audio.duration)return;const rect=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration});
renderList();
window.addEventListener('load',()=>loadTrack(0));
</script>
</body>
</html>
