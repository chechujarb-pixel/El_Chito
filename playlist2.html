<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Camino Chamánico</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080d;--accent:#a0621a;--accent2:#6b3e0e;--glow:#c8852a;--text:#f0e4cc;--muted:#604830;--bar-h:4px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Raleway',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(160,98,26,0.1) 0%,transparent 60%),radial-gradient(ellipse at 20% 100%,rgba(100,60,10,0.08) 0%,transparent 50%);pointer-events:none;z-index:0}
.back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;letter-spacing:1px;padding:12px 0 0 24px;transition:color 0.2s;position:relative;z-index:1}
.back-btn:hover{color:var(--text)}
.container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 100px}
.header{padding:16px 24px 28px;border-bottom:1px solid rgba(160,98,26,0.2)}
.cover-wrap{width:100%;aspect-ratio:1;overflow:hidden;border-radius:10px;margin-bottom:20px}
.cover-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.header-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;color:var(--accent);margin-bottom:10px}
.header h1{font-family:'Cinzel',serif;font-size:clamp(26px,7vw,36px);line-height:1.2;color:var(--text)}
.header h1 span{color:var(--glow)}
.header-meta{margin-top:10px;font-size:12px;color:var(--muted);letter-spacing:2px;font-weight:300}
.now-playing{margin:20px 16px;background:linear-gradient(160deg,rgba(160,98,26,0.1) 0%,rgba(6,8,13,0.8) 100%);border:1px solid rgba(160,98,26,0.25);border-radius:16px;padding:22px;box-shadow:0 0 40px rgba(160,98,26,0.06),inset 0 1px 0 rgba(255,255,255,0.04)}
.np-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:4px;color:var(--accent);margin-bottom:8px}
.np-title{font-size:20px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-index{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:1px}
.progress-wrap{margin-top:18px;cursor:pointer}
.progress-bg{width:100%;height:var(--bar-h);background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--glow));width:0%;border-radius:2px;transition:width 0.3s linear;box-shadow:0 0 8px rgba(200,133,42,0.4)}
.time-row{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.controls{display:flex;align-items:center;justify-content:center;gap:28px;margin-top:20px}
.btn{background:none;border:none;color:var(--muted);cursor:pointer;transition:color 0.2s,transform 0.15s;display:flex;align-items:center;justify-content:center}
.btn:hover{color:var(--text);transform:scale(1.1)}
.btn-play{width:54px;height:54px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:50%;color:#fff;box-shadow:0 0 24px rgba(160,98,26,0.4),0 4px 12px rgba(0,0,0,0.4)}
.btn-play:hover{transform:scale(1.08);box-shadow:0 0 36px rgba(200,133,42,0.6),0 4px 12px rgba(0,0,0,0.4);color:#fff}
.volume-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.volume-row svg{color:var(--muted);flex-shrink:0}
input[type=range]{flex:1;-webkit-appearance:none;height:var(--bar-h);background:rgba(255,255,255,0.08);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--glow);border-radius:50%;cursor:pointer;box-shadow:0 0 6px rgba(200,133,42,0.5)}
.tracklist{margin:8px 16px 0}
.track{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:10px;cursor:pointer;transition:background 0.18s;border-bottom:1px solid rgba(255,255,255,0.03)}
.track:hover{background:rgba(160,98,26,0.1)}
.track.active{background:rgba(160,98,26,0.15);border-color:transparent}
..track-num{font-family:'Cinzel',serif;font-size:13px;color:var(--muted);width:22px;text-align:center;flex-shrink:0;font-weight:700;}
.track.active .track-num{color:var(--glow)}
.track-info{flex:1;min-width:0}
.track-name{font-size:14px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track.active .track-name{color:var(--glow)}
.track-dur{font-size:12px;color:var(--muted);flex-shrink:0;font-variant-numeric:tabular-nums;font-weight:700;}
.eq{display:none;gap:2px;align-items:flex-end;height:14px}
.track.active.playing .eq{display:flex}
.track.active.playing .track-num{display:none}
.eq span{width:3px;background:var(--glow);border-radius:1px;animation:eq 0.8s ease-in-out infinite alternate}
.eq span:nth-child(2){animation-delay:0.2s}.eq span:nth-child(3){animation-delay:0.4s}
@keyframes eq{0%{height:3px}100%{height:14px}}
.loading{display:none;width:18px;height:18px;border:2px solid rgba(160,98,26,0.2);border-top-color:var(--glow);border-radius:50%;animation:spin 0.7s linear infinite}
.track.active.buffering .loading{display:block}
.track.active.buffering .track-num,.track.active.buffering .eq{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
audio{display:none}
</style>
</head>

  {title:"Por No Decir...",url:"https://cur19364667-my.sharepoint.com/:u:/g/personal/ks1070_office365x_org/IQA0pjt6A2tIQpTJLfupEfW2Aflc4nn7O4kk7KK5o0YK6o8?e=yaPGvZ&download=1"},
  {title:"Déjame Soñar",url:"https://cur19364667-my.sharepoint.com/:u:/g/personal/ks1070_office365x_org/IQDTHZmInD6hTaNkH3r04i3QAekPe2wIqomXkihez3eCMWc?e=Y0HPux&download=1"},
  {title:"Desesperados",url:"https://cur19364667-my.sharepoint.com/:u:/g/personal/ks1070_office365x_org/IQAE8Zl9O_xMQYdkWtZqB8rOAXqIlHnTtc1fvxEQ7cCOIFM?e=01fhjC&download=1"},
  {title:"En el Ojo del Huracán",url:"https://cur19364667-my.sharepoint.com/:u:/g/personal/ks1070_office365x_org/IQDRLcpfz76NTLMZo6AczUPoAWbU-kCd6Yt78frRMGvCCoc?e=QMFS4U&download=1"},
  {title:"Sol Rojo",url:"https://cur19364667-my.sharepoint.com/:u:/g/personal/ks1070_office365x_org/IQCoGKM8mRWtQopiwjdLvyGMAQ9E9WoKgGGcQWTHNC7vEl0?e=RMRlhW&download=1"},
  {title:"El Blues de la Triste Figura",url:"https://cur19364667-my.sharepoint.com/:u:/g/personal/ks1070_office365x_org/IQAO0j-20GiMSofrAWVZyZ7kASlLsWVFO-igBlhPiVg19BM?e=JKqsWl&download=1"},
  {title:"Volver a Nacer",url:"https://cur19364667-my.sharepoint.com/:u:/g/personal/ks1070_office365x_org/IQCt54hnblG-T6Ua0DbXQprTAUKwN-h2K5yBgshcO0i1ubc?e=SDCD5E&download=1"},
  {title:"Días Enteros [Dirty Blues]",url:"https://cur19364667-my.sharepoint.com/:u:/g/personal/ks1070_office365x_org/IQCOVusWAK3-Ra1yul1VG9DSAUloVuKi7TLiTVqoRvpPd5w?e=ENqegC&download=1"},
];
const audio=document.getElementById('player');
let current=-1;
function fmt(s){if(isNaN(s)||s===undefined)return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec.toString().padStart(2,'0')}`}
function renderList(){document.getElementById('tracklist').innerHTML=tracks.map((t,i)=>`<div class="track" id="track${i}" onclick="loadTrack(${i})"><div class="eq"><span></span><span></span><span></span></div><div class="loading"></div><div class="track-num">${i+1}</div><div class="track-info"><div class="track-name">${t.title}</div></div><div class="track-dur" id="dur${i}">0:00</div></div>`).join('')}
function setActive(i){document.querySelectorAll('.track').forEach(el=>el.classList.remove('active','playing','buffering'));if(i>=0){document.getElementById(`track${i}`).classList.add('active');document.getElementById(`track${i}`).scrollIntoView({behavior:'smooth',block:'nearest'})}document.getElementById('npTitle').textContent=i>=0?tracks[i].title:'—';document.getElementById('npIndex').textContent=i>=0?`${i+1} de ${tracks.length}`:'—'}
function loadTrack(i){current=i;setActive(i);document.getElementById(`track${i}`).classList.add('buffering');audio.src=tracks[i].url;audio.volume=document.getElementById('volume').value;audio.load();audio.play().catch(()=>{})}
function togglePlay(){if(current<0){loadTrack(0);return}if(audio.paused)audio.play();else audio.pause()}
function prev(){if(current>0)loadTrack(current-1)}
function next(){if(current<tracks.length-1)loadTrack(current+1)}
function setVolume(v){audio.volume=v}
audio.addEventListener('playing',()=>{document.getElementById('iconPlay').style.display='none';document.getElementById('iconPause').style.display='';const el=document.getElementById(`track${current}`);if(el){el.classList.remove('buffering');el.classList.add('playing')}});
audio.addEventListener('pause',()=>{document.getElementById('iconPlay').style.display='';document.getElementById('iconPause').style.display='none';const el=document.getElementById(`track${current}`);if(el)el.classList.remove('playing')});
audio.addEventListener('timeupdate',()=>{const pct=audio.duration?(audio.currentTime/audio.duration)*100:0;document.getElementById('progressFill').style.width=pct+'%';document.getElementById('timeCurrent').textContent=fmt(audio.currentTime);document.getElementById('timeTotal').textContent=fmt(audio.duration)});
audio.addEventListener('loadedmetadata',()=>{document.getElementById(`dur${current}`).textContent=fmt(audio.duration);document.getElementById('timeTotal').textContent=fmt(audio.duration)});
audio.addEventListener('ended',()=>{if(current<tracks.length-1)loadTrack(current+1);else{document.getElementById('iconPlay').style.display='';document.getElementById('iconPause').style.display='none'}});
audio.addEventListener('waiting',()=>{const el=document.getElementById(`track${current}`);if(el){el.classList.remove('playing');el.classList.add('buffering')}});
document.getElementById('progressWrap').addEventListener('click',(e)=>{if(!audio.duration)return;const rect=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration});
renderList();
window.addEventListener('load',()=>loadTrack(0));
</script>
</body>
</html>
